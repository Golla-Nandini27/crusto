{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Products • CRUSTO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap (only added, nothing else changed) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* ===== YOUR ORIGINAL DESIGN ===== */
.section{
padding:20px;
}

.product-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:20px;
}

.product-card{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.15);
text-align:center;
}

/* FIXED IMAGE STYLE (was wrong selector before) */
.product-card img{
width:100%;
height:160px;
object-fit:cover;
border-radius:8px;
}

.product-card button{
width:100%;
padding:10px;
border:none;
background:#e31837;
color:white;
border-radius:8px;
cursor:pointer;
}

/* ================= RESPONSIVE FIX ONLY ================= */

/* Tablet */
@media (max-width: 992px){
.product-grid{
grid-template-columns:repeat(2,1fr);
}
}

/* Mobile */
@media (max-width: 576px){
.product-grid{
grid-template-columns:1fr;
}
.product-card{
width:100%;
}
.product-card img{
height:auto;
}
}
</style>
</head>

<body>

<div class="section" id="products">
<h2>Popular Items</h2>

<div class="product-grid">
{% for p in products %}
<div class="product-card">

<!-- FIXED IMAGE -->
<img src="{% static 'main/images/products/' %}{{ p.image }}" alt="{{ p.name }}">
<h3>{{p.name}}</h3>
<p>₹{{p.price}}</p>

<a href="{% url 'add' p.id %}">
<button>Add to Cart</button>
</a>

</div>
{% endfor %}
</div>

</div>

</body>
</html>
