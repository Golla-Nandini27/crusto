{% load static %}
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<title>Track Your Order • CRUSTO</title>

<style>
body{
font-family:Segoe UI;
background:#f4f6f8;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.order-card{
background:white;
padding:20px;
margin-bottom:25px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

/* TRACK BAR */
.track-bar{
position:relative;
margin-top:30px;
height:6px;
background:#ddd;
border-radius:5px;
}

/* PROGRESS BAR (renamed to avoid bootstrap conflict) */
.progress-bar-custom{
position:absolute;
height:6px;
background:#28a745;
border-radius:5px;
transition:width 1s ease;
}

/* STATUS WIDTHS */
.Preparing{ width:50%; }
.Out\ for\ delivery{ width:75%; }
.Delivered{ width:100%; }

/* STEPS */
.steps{
display:flex;
justify-content:space-between;
margin-top:15px;
font-size:14px;
}

/* TRUCK */
.truck{
position:absolute;
top:-20px;
font-size:24px;
transition:left 1s ease;
}

/* ================= RESPONSIVE FIX ONLY ================= */

/* Tablet */
@media (max-width: 992px){
.container{
max-width:100%;
padding:10px;
}
.order-card{
padding:18px;
}
.steps{
font-size:13px;
}
.truck{
font-size:22px;
}
}

/* Mobile */
@media (max-width: 576px){
body{
padding:10px;
}
h1{
font-size:22px;
}
.order-card{
padding:15px;
border-radius:10px;
}
.steps{
font-size:12px;
flex-wrap:wrap;
gap:5px;
}
.track-bar{
margin-top:25px;
}
.truck{
font-size:20px;
top:-18px;
}
}
</style>
</head>

<body>

<div class="container">

<h1>🚚 Track Your Orders</h1>

{% for order in orders %}

<div class="order-card">

<h3>Order #{{order.id}}</h3>
<p>Total ₹{{order.total}}</p>

<p>
Status:
<strong>{{order.get_status_display}}</strong>
</p>

<div class="track-bar">

<div class="progress-bar-custom
{% if order.status == 'Preparing' %} Preparing
{% elif order.status == 'Out for delivery' %} Out for delivery
{% elif order.status == 'Delivered' %} Delivered
{% endif %}
"></div>

<div class="truck"
style="
left:
{% if order.status == 'Preparing' %} 45%;
{% elif order.status == 'Out for delivery' %} 70%;
{% elif order.status == 'Delivered' %} 92%;
{% else %} 20%;
{% endif %}
">
🚚
</div>

</div>

<div class="steps">
<span>Placed</span>
<span>Preparing</span>
<span>Out</span>
<span>Delivered</span>
</div>

<p style="margin-top:10px;color:gray;">
{{order.created_at}}
</p>

</div>

{% endfor %}

</div>

</body>
</html>
