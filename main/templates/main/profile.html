{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Profile • CRUSTO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
font-family:Segoe UI;
background:linear-gradient(135deg,#0b2a5b,#1e3c72);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.card{
background:white;
padding:30px;
border-radius:15px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
text-align:center;
}
.profile-img{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;
margin-bottom:10px;
border:4px solid #eee;
}
input{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}
button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#e31837;
color:white;
font-weight:bold;
cursor:pointer;
}
.delete-btn{
background:#999;
margin-top:8px;
}
.delete-btn:hover{
background:#666;
}

/* ================= RESPONSIVE FIX ONLY ================= */

/* Tablet */
@media (max-width: 992px){
.card{
width:330px;
padding:25px;
}
.profile-img{
width:90px;
height:90px;
}
}

/* Mobile */
@media (max-width: 576px){
body{
padding:15px;
height:auto;
min-height:100vh;
}
.card{
width:100%;
max-width:350px;
padding:22px;
border-radius:14px;
}
.profile-img{
width:85px;
height:85px;
}
input{
padding:9px;
font-size:14px;
}
button{
padding:11px;
font-size:15px;
}
}
</style>
</head>
<body>

<div class="card">

<!-- FIXED IMAGE (STATIC) -->
<img src="{% static 'main/images/' %}{{ profile.image }}" class="profile-img" alt="Profile">

<form method="POST">
{% csrf_token %}

<input type="text"
name="username"
value="{{request.user.username}}">

<input type="email"
name="email"
value="{{request.user.email}}">

<button>
Save Changes
</button>

</form>

<!-- REMOVE IMAGE BUTTON (Resets to default) -->
<form method="POST">
{% csrf_token %}
<input type="hidden" name="delete_image" value="1">
<button class="delete-btn">
Remove Profile Photo
</button>
</form>

</div>

</body>
</html>
