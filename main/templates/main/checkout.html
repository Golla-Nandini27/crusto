{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap 5 -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    font-family:Segoe UI, Arial;
    background:#f4f6f8;
}

/* same box design */
.box{
    background:white;
    padding:30px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    border-radius:10px;
}

/* same button design */
.place-btn{
    background:#e31837;
    color:white;
    padding:12px;
    border:none;
    width:100%;
    font-weight:600;
}

.place-btn:hover{
    background:#c4122f;
}
</style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">

    <!-- responsive width -->
    <div class="box col-lg-4 col-md-6 col-sm-8 col-11">

        <h2>Confirm Order</h2>
        <p>Total Amount ₹{{total}}</p>

        <form method="POST">
            {% csrf_token %}
            <button class="place-btn">
                Place Order
            </button>
        </form>

    </div>

</div>

</body>
</html>
