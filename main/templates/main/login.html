{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Login • CRUSTO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
margin:0;
font-family:Segoe UI;
background:url("{% static 'main/images/bg4.jpg' %}") no-repeat center center fixed;
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,.65);
}

.card{
position:relative;
background:white;
padding:40px;
border-radius:12px;
width:340px;
box-shadow:0 10px 40px rgba(0,0,0,.5);
animation:fade .4s ease;
z-index:2;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.logo{
text-align:center;
margin-bottom:15px;
}

/* FIXED LOGO IMAGE STYLE */
.logo img{
width:60px;
}

h2{
text-align:center;
margin-bottom:20px;
color:#0b2a5b;
}

.input-group{
position:relative;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
transition:.3s;
}

input:focus{
border-color:#e31837;
box-shadow:0 0 5px rgba(227,24,55,.4);
outline:none;
}

.eye{
position:absolute;
right:12px;
top:12px;
cursor:pointer;
font-size:18px;
}

.remember-container{
margin:10px 0;
display:flex;
align-items:center;
}

.remember-label{
display:flex;
align-items:center;
gap:8px;
font-size:14px;
cursor:pointer;
}

.remember-label input{
width:16px;
height:16px;
cursor:pointer;
}

.login-btn{
width:100%;
padding:12px;
background:#e31837;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:.3s;
}

.login-btn:hover{
background:#c4122f;
}

.login-btn.loading{
opacity:.7;
pointer-events:none;
}

.google-btn{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
background:white;
border:1px solid #ddd;
padding:12px;
border-radius:10px;
text-decoration:none;
color:black;
font-weight:600;
margin-top:10px;
transition:.3s;
}

.google-btn:hover{
background:#f5f5f5;
transform:scale(1.02);
}

.google-icon{
width:20px;
height:20px;
}

.link{
text-align:center;
margin-top:15px;
}

.link a{
color:#e31837;
text-decoration:none;
font-weight:bold;
}

.error{
color:red;
text-align:center;
margin-bottom:10px;
animation:shake .3s;
}

@keyframes shake{
0%{transform:translateX(-5px);}
50%{transform:translateX(5px);}
100%{transform:translateX(0);}
}

/* ================= RESPONSIVE FIX ONLY ================= */

/* Tablet */
@media (max-width: 992px){
.card{
width:320px;
padding:30px;
}
.logo img{
width:55px;
}
}

/* Mobile */
@media (max-width: 576px){
body{
padding:15px;
}
.card{
width:100%;
max-width:340px;
padding:25px;
border-radius:10px;
}
h2{
font-size:20px;
}
input{
font-size:14px;
padding:11px;
}
.login-btn{
padding:11px;
font-size:15px;
}
.google-btn{
padding:11px;
font-size:14px;
}
.logo img{
width:50px;
}
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="card">

<div class="logo">
<img src="{% static 'main/images/logo.png' %}" alt="CRUSTO Logo">
</div>

<h2>Login to CRUSTO</h2>

{% if error %}
<div class="error">
{{error}}
</div>
{% endif %}

<form method="post" onsubmit="loading()">
{% csrf_token %}

<input name="username" placeholder="Username" required>

<div class="input-group">
<input type="password" id="password" name="password" placeholder="Password" required>
<span class="eye" onclick="toggle()">👁</span>
</div>

<div class="remember-container">
<label class="remember-label">
<input type="checkbox" name="remember">
<span>Remember me</span>
</label>
</div>

<button id="btn" class="login-btn">
Login
</button>

</form>

<a href="/accounts/google/login/" class="google-btn">
<img src="{% static 'main/images/google.png' %}" class="google-icon" alt="Google">
Continue with Google
</a>

<div class="link">
New user?
<a href="{% url 'register' %}">
Register
</a>
</div>

</div>

<script>
function toggle(){
let p=document.getElementById("password");
p.type=p.type==="password"?"text":"password";
}
function loading(){
let btn=document.getElementById("btn");
btn.innerHTML="Logging in...";
btn.classList.add("loading");
}
</script>

</body>
</html>
