<!DOCTYPE html>
<html>
<head>
<title>CRUSTO Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    font-family:Segoe UI, Arial;
    background:#f4f6f8;
    padding:30px;
}

/* same card design */
.card-box{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
    text-align:center;
    transition:.3s;
}

.card-box:hover{
    transform:translateY(-5px);
}

/* number styling */
.card-box h2{
    font-weight:bold;
    margin-bottom:10px;
}

/* ================= RESPONSIVE FIX ONLY ================= */

/* Tablet */
@media (max-width: 992px){
body{
    padding:20px;
}
}

/* Mobile */
@media (max-width: 576px){
body{
    padding:15px;
}
h1{
    font-size:22px;
}
.card-box{
    padding:18px;
}
.card-box h2{
    font-size:22px;
}
}
</style>
</head>

<body>

<div class="container">

    <h1 class="mb-4">Admin Dashboard</h1>

    <div class="row g-4">

        <!-- Orders -->
        <div class="col-lg-3 col-md-6 col-sm-6 col-12">
            <div class="card-box">
                <h2>{{ orders|default:"0" }}</h2>
                Total Orders
            </div>
        </div>

        <!-- Users -->
        <div class="col-lg-3 col-md-6 col-sm-6 col-12">
            <div class="card-box">
                <h2>{{ users|default:"0" }}</h2>
                Users
            </div>
        </div>

        <!-- Products -->
        <div class="col-lg-3 col-md-6 col-sm-6 col-12">
            <div class="card-box">
                <h2>{{ products|default:"0" }}</h2>
                Products
            </div>
        </div>

        <!-- Revenue -->
        <div class="col-lg-3 col-md-6 col-sm-6 col-12">
            <div class="card-box">
                <h2>₹{{ revenue|default:"0" }}</h2>
                Revenue
            </div>
        </div>

    </div>

</div>

</body>
</html>
