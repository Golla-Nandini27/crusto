{% load static %}
<!DOCTYPE html>
<html>
<head>

<title>Register • CRUSTO</title>

<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>

body{
margin:0;
font-family:Segoe UI;
background:url("{% static 'main/images/bg4.jpg' %}") no-repeat center center fixed;
background-size:cover;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,.65);
}

.card{

position:relative;
background:white;
padding:40px;
border-radius:12px;
width:340px;
box-shadow:0 10px 40px rgba(0,0,0,.5);

animation:fade .4s ease;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.logo{
text-align:center;
margin-bottom:15px;
}

.logo img{
width:60px;
}

h2{
text-align:center;
margin-bottom:20px;
}

.input-group{
position:relative;
}

input{

width:100%;
padding:12px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;

}

input:focus{

border-color:#e31837;
outline:none;
box-shadow:0 0 5px rgba(227,24,55,.4);

}

.eye{

position:absolute;
right:10px;
top:12px;
cursor:pointer;
font-size:18px;

}

button{

width:100%;
padding:12px;
background:#e31837;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;

}

.link{

text-align:center;
margin-top:15px;

}

.link a{

color:#e31837;
text-decoration:none;
font-weight:bold;

}

.error{

color:red;
text-align:center;
margin-bottom:10px;

}

/* ================= RESPONSIVE FIX ONLY (NO DESIGN CHANGE) ================= */

/* Tablet */
@media (max-width: 992px){

.card{
width:320px;
padding:30px;
}

.logo img{
width:55px;
}

}


/* Mobile */
@media (max-width: 576px){

body{
padding:15px;
height:auto;
min-height:100vh;
}

.card{
width:100%;
max-width:340px;
padding:25px;
border-radius:12px;
}

.logo img{
width:50px;
}

h2{
font-size:20px;
}

input{
padding:11px;
font-size:14px;
}

button{
padding:11px;
font-size:15px;
}

}

</style>

</head>
<body>

<div class="overlay"></div>

<div class="card">

<div class="logo">
<img src="{% static 'main/images/logo.png' %}">
</div>

<h2>Create Account</h2>

{% if error %}
<div class="error">
{{error}}
</div>
{% endif %}

<form method="post">

{% csrf_token %}

<input name="username" placeholder="Username" required>

<div class="input-group">

<input type="password" id="password" name="password" placeholder="Password" required>

<span class="eye" onclick="toggle()">👁</span>

</div>

<button>
Register
</button>

</form>

<div class="link">

Already have account?
<a href="{% url 'login' %}">
Login
</a>

</div>

</div>

<script>

function toggle(){

let p=document.getElementById("password");

p.type=p.type==="password"?"text":"password";

}

</script>

</body>
</html>
