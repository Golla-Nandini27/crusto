{% load static %}
<!DOCTYPE html>
<html>
<head>

<title>CRUSTO Signup</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:Segoe UI;
background:url("{% static 'main/images/bg4.jpg' %}") center/cover no-repeat fixed;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:35px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
width:350px;
animation:fade .5s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1;}
}

.logo{
width:60px;
display:block;
margin:auto;
}

h2{
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#e31837;
color:white;
border:none;
border-radius:8px;
font-weight:bold;
}

button:hover{
background:#c4122f;
}

/* ================= RESPONSIVE FIX ONLY (NO DESIGN CHANGE) ================= */

/* Tablet */
@media (max-width: 992px){

.card{
width:330px;
padding:30px;
}

.logo{
width:55px;
}

}


/* Mobile */
@media (max-width: 576px){

body{
padding:15px;
height:auto;
min-height:100vh;
}

.card{
width:100%;
max-width:350px;
padding:25px;
border-radius:14px;
}

.logo{
width:50px;
}

h2{
font-size:20px;
}

input{
padding:11px;
font-size:14px;
}

button{
padding:11px;
font-size:15px;
}

}

</style>

</head>
<body>

<div class="card">

<img src="{% static 'main/images/logo.png' %}" class="logo">

<h2>Create account</h2>

<form method="post">
{% csrf_token %}
{{ form.as_p }}

<button type="submit">
Complete Signup
</button>

</form>

</div>

</body>
</html>
