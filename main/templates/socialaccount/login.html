{% load static %}
<!DOCTYPE html>
<html>
<head>

<title>CRUSTO - Google Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>

body{
margin:0;
font-family:Segoe UI;
background:url("{% static 'main/images/bg4.jpg' %}") center/cover no-repeat fixed;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
text-align:center;
animation:fade .5s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1;}
}

.logo{
width:70px;
margin-bottom:10px;
}

h2{
margin-bottom:20px;
}

.btn{
background:#e31837;
color:white;
padding:12px 25px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:.3s;
}

.btn:hover{
background:#c4122f;
}

/* ================= RESPONSIVE FIX ONLY (NO DESIGN CHANGE) ================= */

/* Tablet */
@media (max-width: 992px){

.card{
padding:35px;
}

.logo{
width:65px;
}

}


/* Mobile */
@media (max-width: 576px){

body{
padding:15px;
height:auto;
min-height:100vh;
}

.card{
width:100%;
max-width:360px;
padding:28px;
border-radius:14px;
}

.logo{
width:60px;
}

h2{
font-size:20px;
}

p{
font-size:14px;
}

.btn{
padding:11px 22px;
font-size:15px;
}

}

</style>

</head>
<body>

<div class="card">

<img src="{% static 'main/images/logo.png' %}" class="logo">

<h2>Continue with Google</h2>

<p>Sign in securely to CRUSTO</p>

<form method="post">
{% csrf_token %}
<button type="submit" class="btn">
Continue
</button>
</form>

</div>

</body>
</html>
