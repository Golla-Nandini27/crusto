{% extends "admin/change_list.html" %}

{% block extrahead %}
{{ block.super }}

<!-- Bootstrap (only added) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ================= RESPONSIVE FIX ONLY ================= */

/* Tablet */
@media (max-width: 992px){

div[style*="display:flex"]{
flex-wrap:wrap !important;
}

div[style*="display:flex"] > div{
flex:0 0 48%;
margin-bottom:15px;
}

}


/* Mobile */
@media (max-width: 576px){

div[style*="display:flex"]{
flex-direction:column !important;
}

div[style*="display:flex"] > div{
width:100%;
}

}

</style>

{% endblock %}



{% block content %}


<div style="display:flex; gap:20px; margin-bottom:20px;">

<div style="background:#0b5ed7;color:white;padding:20px;border-radius:10px;">
<h2>💰 Revenue</h2>
<h1>₹ {{ total_revenue }}</h1>
</div>

<div style="background:#198754;color:white;padding:20px;border-radius:10px;">
<h2>📦 Orders</h2>
<h1>{{ total_orders }}</h1>
</div>

<div style="background:#dc3545;color:white;padding:20px;border-radius:10px;">
<h2>👤 Users</h2>
<h1>{{ total_users }}</h1>
</div>

</div>

{{ block.super }}

{% endblock %}
