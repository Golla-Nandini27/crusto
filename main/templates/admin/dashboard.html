{% extends "admin/change_list.html" %}

{% block extrahead %}
{{ block.super }}

<!-- Bootstrap (only added) -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* Make cards consistent */
.dashboard-stats{
display:flex;
gap:20px;
margin-bottom:20px;
flex-wrap:wrap;
}

.dashboard-stats .stat-box{
padding:20px;
border-radius:10px;
color:white;
min-width:220px;
flex:1;
}

/* ================= RESPONSIVE FIX ONLY ================= */

/* Tablet */
@media (max-width: 992px){
.dashboard-stats{
flex-wrap:wrap;
}
.dashboard-stats .stat-box{
flex:0 0 48%;
margin-bottom:15px;
}
}

/* Mobile */
@media (max-width: 576px){
.dashboard-stats{
flex-direction:column;
}
.dashboard-stats .stat-box{
width:100%;
}
}
</style>

{% endblock %}

{% block content %}

<div class="dashboard-stats">

<div class="stat-box" style="background:#0b5ed7;">
<h2>💰 Revenue</h2>
<h1>₹ {{ total_revenue|default:"0" }}</h1>
</div>

<div class="stat-box" style="background:#198754;">
<h2>📦 Orders</h2>
<h1>{{ total_orders|default:"0" }}</h1>
</div>

<div class="stat-box" style="background:#dc3545;">
<h2>👤 Users</h2>
<h1>{{ total_users|default:"0" }}</h1>
</div>

</div>

{{ block.super }}

{% endblock %}
